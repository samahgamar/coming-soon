<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قريباً - موقعنا قيد التطوير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to right, #2c3e50, #3498db);
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
    }
    h1 {
      font-size: 2.5em;
    }
    #countdown {
      font-size: 2em;
      margin: 20px 0;
    }
    .email-form {
      margin: 20px 0;
    }
    input[type="email"] {
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 250px;
    }
    button {
      padding: 10px 20px;
      margin-right: 10px;
      background-color: #f1c40f;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .social {
      margin-top: 30px;
    }
    .social a {
      margin: 0 10px;
      color: white;
      font-size: 1.5em;
      text-decoration: none;
    }
    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #eee;
    }
  </style>
</head>
<body>
  <h1>🌟 موقعنا قيد التطوير 🌟</h1>
  <p>نحن نعمل على شيء رائع! ترقبونا قريباً</p>

  <div id="countdown">00:00:00</div>

  <div class="email-form">
    <input type="email" placeholder="أدخل بريدك الإلكتروني" />
    <button>إشترك</button>
  </div>

  <div class="social">
    <a href="#">📘</a>
    <a href="#">🐦</a>
    <a href="#">📸</a>
    <a href="#">🎥</a>
  </div>

  <footer>
    © 2025 - جميع الحقوق محفوظة
  </footer>

  <script>
    // ضبط وقت الإطلاق
    const launchDate = new Date("2025-07-01T00:00:00").getTime();

    const timer = setInterval(() => {
      const now = new Date().getTime();
      const diff = launchDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "🚀 انطلقنا!";
        clearInterval(timer);
      } else {
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
          `${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${seconds.toString().padStart(2, '0')}`;
      }
    }, 1000);
  </script>
</body>
</html>
